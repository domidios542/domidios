<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi novia, Vampira? 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            color: #f8f8f2;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(26, 18, 35, 0.7);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid #8a2be2;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            max-width: 600px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.7);
            background: linear-gradient(45deg, #ff6b6b, #ff8ed4, #d48cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s infinite;
        }

        .heart {
            font-size: 2rem;
            animation: heartbeat 1.5s infinite;
            display: block;
            margin: 1rem auto;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 1.2rem 2rem;
            font-size: 1.3rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff6b6b, #ff8ed4);
            color: white;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 25px rgba(255, 105, 180, 0.8);
        }

        .btn-no {
            background: linear-gradient(45deg, #8a2be2, #6a0dad);
            color: white;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
        }

        .btn-no:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.8);
        }

        /* Animaciones de murciélagos */
        .bat {
            position: absolute;
            font-size: 1.5rem;
            z-index: 1;
            animation: fly-bat 15s infinite linear;
        }

        /* Animaciones de fantasmas */
        .ghost {
            position: absolute;
            font-size: 2rem;
            z-index: 1;
            animation: float-ghost 12s infinite ease-in-out;
            opacity: 0.7;
        }

        /* Keyframes */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fly-bat {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--end-x), var(--end-y)) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes float-ghost {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(20px, -30px) scale(1.1);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            75% {
                transform: translate(15px, -15px) scale(1.05);
            }
        }

        .message {
            margin-top: 2rem;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0ff;
        }

        .signature {
            margin-top: 2rem;
            font-size: 1.4rem;
            font-style: italic;
            color: #ff8ed4;
            text-shadow: 0 0 10px rgba(255, 142, 212, 0.5);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff6b6b;
            border-radius: 50%;
            opacity: 0;
            z-index: 20;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .btn {
                padding: 1rem 1.5rem;
                font-size: 1.1rem;
            }
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }
            .signature {
                font-size: 1.2rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>¿Quieres ser mi novia, Vampira? 💖</h1>
        <div class="heart">🖤</div>
        <p class="message">En este mundo oscuro y misterioso, tú eres la luz que ilumina mi eternidad. Mi corazón vampírico late solo por ti...</p>
        
        <div class="buttons">
            <button class="btn btn-yes" onclick="showConfetti()">Sí 💕</button>
            <button class="btn btn-no">SI, NO HAY MÁS OPCIONES 💖</button>
        </div>
        
        <div class="signature">Atentamente, Domidios</div>
    </div>

    <script>
        // Crear murciélagos y fantasmas
        function createBatsAndGhosts() {
            const body = document.body;
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            // Crear murciélagos
            for (let i = 0; i < 8; i++) {
                const bat = document.createElement('div');
                bat.className = 'bat';
                bat.innerHTML = '🦇';
                
                // Posición inicial aleatoria en los bordes
                const side = Math.floor(Math.random() * 4);
                let startX, startY, endX, endY;
                
                switch(side) {
                    case 0: // Arriba
                        startX = Math.random() * screenWidth;
                        startY = -50;
                        endX = Math.random() * screenWidth;
                        endY = screenHeight + 50;
                        break;
                    case 1: // Derecha
                        startX = screenWidth + 50;
                        startY = Math.random() * screenHeight;
                        endX = -50;
                        endY = Math.random() * screenHeight;
                        break;
                    case 2: // Abajo
                        startX = Math.random() * screenWidth;
                        startY = screenHeight + 50;
                        endX = Math.random() * screenWidth;
                        endY = -50;
                        break;
                    case 3: // Izquierda
                        startX = -50;
                        startY = Math.random() * screenHeight;
                        endX = screenWidth + 50;
                        endY = Math.random() * screenHeight;
                        break;
                }
                
                bat.style.setProperty('--end-x', (endX - startX) + 'px');
                bat.style.setProperty('--end-y', (endY - startY) + 'px');
                bat.style.left = startX + 'px';
                bat.style.top = startY + 'px';
                bat.style.animationDelay = Math.random() * 5 + 's';
                bat.style.animationDuration = (10 + Math.random() * 10) + 's';
                
                body.appendChild(bat);
            }

            // Crear fantasmas
            for (let i = 0; i < 6; i++) {
                const ghost = document.createElement('div');
                ghost.className = 'ghost';
                ghost.innerHTML = '👻';
                
                // Posición aleatoria en la pantalla
                const x = Math.random() * (screenWidth - 40);
                const y = Math.random() * (screenHeight - 40);
                
                ghost.style.left = x + 'px';
                ghost.style.top = y + 'px';
                ghost.style.animationDelay = Math.random() * 3 + 's';
                ghost.style.animationDuration = (8 + Math.random() * 8) + 's';
                ghost.style.fontSize = (1.5 + Math.random() * 1) + 'rem';
                
                body.appendChild(ghost);
            }
        }

        // Efecto de confeti cuando se hace clic en "Sí"
        function showConfetti() {
            const colors = ['#ff6b6b', '#ff8ed4', '#d48cff', '#8a2be2', '#ff4757'];
            const body = document.body;
            
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animation = `confetti-fall ${Math.random() * 3 + 2}s linear forwards`;
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = confetti.style.width;
                
                body.appendChild(confetti);
                
                // Eliminar confeti después de la animación
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
            
            // Mensaje de éxito
            setTimeout(() => {
                alert('¡Sabía que dirías que sí! 🖤 Eres mi eterna vampira y yo tu devoto humano. ¡Te amo! 💖');
            }, 1000);
        }

        // Inicializar cuando la página cargue
        window.addEventListener('load', createBatsAndGhosts);

        // Ajustar si la ventana cambia de tamaño
        window.addEventListener('resize', () => {
            // Limpiar y recrear animaciones
            document.querySelectorAll('.bat, .ghost').forEach(el => el.remove());
            setTimeout(createBatsAndGhosts, 100);
        });

        // Hacer que el botón "NO HAY MÁS OPCIONES" también funcione como "Sí"
        document.querySelector('.btn-no').addEventListener('click', showConfetti);
    </script>
</body>
</html>
